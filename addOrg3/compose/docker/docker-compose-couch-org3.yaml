version: '2'

services:
  couchdb.org3.example.com:
    container_name: couchdb.org3.example.com
    image: couchdb:3.1
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - "5984:5984"
    networks:
      - fabric_test

networks:
  fabric_test:
    external: true
